<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Grid, Flexbox & Animation Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #eef6ff;
    }

    /* Header using Flexbox */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #007bff;
      color: white;
      padding: 15px 20px;
      animation: slideDown 2s ease;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: yellow;
    }

    /* Main using Grid */
    main {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .box {
      background-color: white;
      padding: 20px;
      text-align: center;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: fadeIn 2s ease;
    }

    .box:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 10px;
      background-color: #007bff;
      color: white;
      animation: fadeUp 2s ease;
    }

    /* 🌟 Animations using 10%, 25%, 50%, etc. */

    @keyframes slideDown {
      0%   { transform: translateY(-100px); opacity: 0; }
      10%  { transform: translateY(-80px); opacity: 0.3; }
      25%  { transform: translateY(-40px); opacity: 0.6; }
      50%  { transform: translateY(-20px); opacity: 0.8; }
      75%  { transform: translateY(-10px); opacity: 0.9; }
      100% { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeIn {
      0%   { opacity: 0; transform: scale(0.8); }
      25%  { opacity: 0.3; transform: scale(0.9); }
      50%  { opacity: 0.6; transform: scale(1.05); }
      75%  { opacity: 0.8; transform: scale(1); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeUp {
      0%   { transform: translateY(50px); opacity: 0; }
      25%  { transform: translateY(30px); opacity: 0.4; }
      50%  { transform: translateY(15px); opacity: 0.7; }
      75%  { transform: translateY(5px); opacity: 0.9; }
      100% { transform: translateY(0); opacity: 1; }
    }

  </style>
</head>
<body>

  <header>
    <h2>My Simple Page</h2>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main>
    <div class="box">This section uses <b>CSS Grid</b>.</div>
    <div class="box">Header is built with <b>Flexbox</b>.</div>
    <div class="box">Hover here to see <b>Transition</b>.</div>
    <div class="box">Elements load with <b>Animation</b>.</div>
  </main>

  <footer>
    © 2025 Simple CSS Demo Page
  </footer>

</body>
</html>
