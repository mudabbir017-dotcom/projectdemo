<!DOCTYPE html>
<html>
<head>
  <title>Max and Min in Array</title>
</head>
<body>
  <h3>Find Maximum and Minimum in an Array</h3>
  <input type="text" id="numbers" placeholder="Enter numbers separated by commas">
  <button onclick="findMaxMin()">Find</button>
  <p id="result"></p>

  <script>
    function findMaxMin() {
      // Get user input and convert it into an array of numbers
      let input = document.getElementById("numbers").value;
      let arr = input.split(",").map(Number);

      // Initialize max and min
      let max = arr[0];
      let min = arr[0];

      // Loop through array to find max and min
      for (let i = 1; i < arr.length; i++) {
        if (arr[i] > max) max = arr[i];
        if (arr[i] < min) min = arr[i];
      }

      // Display result
      document.getElementById("result").innerHTML =
        "Maximum = " + max + "<br>Minimum = " + min;
    }
  </script>
</body>
</html>
